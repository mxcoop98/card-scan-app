services:
  postgres:
    image: postgres:16-alpine
    container_name: cardtracker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cardtracker
    ports:
      - "5432:5432"
    volumes:
      - cardtracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cardtracker"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  cardtracker_pgdata:
